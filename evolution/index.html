<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6b21a8">
  <title>Árvore Evolutiva do Mimo — Academia das Questões</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/animations.css">
  <link rel="stylesheet" href="../styles/evolution.css">
</head>
<body>

<!-- ── App Header (shared) ── -->
<header class="app-header" id="app-header" style="display:none;">
  <div class="header-logo">
    Academia das Questões
    <span id="header-name"></span>
  </div>
  <div class="header-xp">
    <span class="xp-icon">⚡</span>
    <span id="header-xp">0</span> XP
  </div>
  <div class="header-rank" id="header-rank"></div>
  <button class="btn-logout" id="btn-logout">Sair</button>
</header>

<!-- ── Main Evolution Page ── -->
<main class="evo-page" id="evo-page">

  <!-- Back button -->
  <div style="padding-top:16px;">
    <button class="btn-evo-back" onclick="goBack()">← Voltar ao Início</button>
  </div>

  <!-- ── Header: MIMO + XP + progress dots ── -->
  <div class="evo-header" id="evo-header">
    <div class="evo-header-top">
      <div class="evo-title-block">
        <div class="evo-eyebrow">✦ ACADEMIA DAS QUESTÕES ✦</div>
        <div class="evo-title">Árvore Evolutiva<br><span id="evo-path-title">do Mimo</span></div>
        <div class="evo-subtitle">Cada escolha define o destino do seu Mimo!</div>
      </div>
      <div class="mimo-avatar-wrap">
        <div class="mimo-avatar" id="mimo-avatar-header">🐱</div>
        <div class="mimo-avatar-name" id="mimo-avatar-name">Mimo</div>
        <div class="mimo-avatar-stage" id="mimo-avatar-stage">Estágio 0</div>
      </div>
    </div>

    <!-- XP bar -->
    <div class="evo-xp-bar-section">
      <div class="evo-xp-label">
        <span>Progresso de Evolução</span>
        <strong id="evo-xp-pct">0%</strong>
      </div>
      <div class="evo-xp-track">
        <div class="evo-xp-fill" id="evo-xp-fill" style="width:0%"></div>
      </div>
      <div class="evo-xp-hint" id="evo-xp-hint">Complete atividades para evoluir!</div>
    </div>

    <!-- Progress dots -->
    <div class="evo-progress-dots" id="evo-progress-dots">
      <!-- injected by JS -->
    </div>
  </div>

  <!-- ── How it works ── -->
  <div class="how-it-works">
    <div class="hiw-step"><span class="hiw-icon">📖</span><span>Estude</span></div>
    <span class="hiw-sep">›</span>
    <div class="hiw-step"><span class="hiw-icon">✅</span><span>Complete</span></div>
    <span class="hiw-sep">›</span>
    <div class="hiw-step"><span class="hiw-icon">⚡</span><span>Ganhe XP</span></div>
    <span class="hiw-sep">›</span>
    <div class="hiw-step"><span class="hiw-icon">🌟</span><span>Evolua</span></div>
  </div>

  <!-- ── Evolution stages ── -->
  <div id="stages-container">
    <!-- Injected by renderAllStages() -->
  </div>

</main>

<!-- ── Toast ── -->
<div class="evo-toast" id="evo-toast">
  <span class="evo-toast-icon" id="toast-icon">✨</span>
  <span id="toast-msg">Escolha salva!</span>
</div>

<!-- ── Shared scripts ── -->
<script src="../scripts/data.js"></script>
<script src="../scripts/db.js"></script>
<script src="../scripts/auth.js"></script>
<script src="../scripts/gamification.js"></script>
<script src="../scripts/evolution_data.js"></script>
<script src="../scripts/evolution_db.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// Evolution Page Controller
// ═══════════════════════════════════════════════════════════════

let currentEvo = null;
let unlockedStages = [];
let completedChapters = [];

// ── Boot ──────────────────────────────────────────────────────
async function initEvoPage() {
  // Auth check
  const loggedIn = await Auth.tryAutoLogin();
  if (!loggedIn) { window.location.href = '/'; return; }

  const student = Auth.student;

  // Show header
  const hdr = document.getElementById('app-header');
  if (hdr) hdr.style.display = 'flex';
  const nameEl = document.getElementById('header-name');
  if (nameEl) nameEl.textContent = student.name;
  const xpEl = document.getElementById('header-xp');
  if (xpEl) xpEl.textContent = student.total_xp || 0;
  const rankEl = document.getElementById('header-rank');
  if (rankEl) {
    const r = Gamification.getGlobalRank(student.total_xp || 0);
    rankEl.textContent = r.icon + ' ' + r.label;
  }

  // Logout
  document.getElementById('btn-logout')?.addEventListener('click', () => {
    if (confirm('Deseja sair?')) { Auth.logout(); window.location.href = '/'; }
  });

  // Load evolution + completed chapters
  [currentEvo, completedChapters] = await Promise.all([
    EvoDB.getOrCreate(student.id),
    EvoDB.getCompletedChapters(student.id),
  ]);

  // Calculate which stages are unlocked
  unlockedStages = STAGE_LABELS
    .filter(s => {
      const reqCap = EVOLUTION_UNLOCKS[s.stage];
      if (!reqCap) return true;
      return completedChapters.some(c => c >= reqCap);
    })
    .map(s => s.stage);

  renderHeader();
  renderAllStages();
}

// ── Render header section ─────────────────────────────────────
function renderHeader() {
  const mimo = getMimoDescription(currentEvo);

  // Avatar
  document.getElementById('mimo-avatar-header').textContent = mimo.emoji;
  document.getElementById('mimo-avatar-name').textContent   = mimo.name;
  document.getElementById('mimo-avatar-stage').textContent  = `Estágio ${currentEvo.stage}`;

  // Path title
  const pathMap = { mamifero: 'Caminho Mamífero 🐾', reptil: 'Caminho Réptil 🦎', ave: 'Caminho Ave 🦅' };
  document.getElementById('evo-path-title').textContent =
    currentEvo.class_path ? pathMap[currentEvo.class_path] || 'do Mimo' : 'do Mimo';

  // XP bar
  const lvInfo = getEvolutionLevel(currentEvo.xp_total || 0);
  document.getElementById('evo-xp-fill').style.width = lvInfo.percentage + '%';
  document.getElementById('evo-xp-pct').textContent  = lvInfo.percentage + '%';
  document.getElementById('evo-xp-hint').textContent =
    `Faltam ${lvInfo.neededXP - lvInfo.currentXP} XP para o nível ${lvInfo.level + 1}!`;

  // Progress dots
  const dotsEl = document.getElementById('evo-progress-dots');
  let dotsHtml = '';
  STAGE_LABELS.forEach((s, idx) => {
    const isDone   = currentEvo.stage > s.stage;
    const isActive = currentEvo.stage === s.stage;
    const cls      = isDone ? 'done' : isActive ? 'active' : 'future';
    dotsHtml += `<div class="prog-dot ${cls}" title="Estágio ${s.stage}: ${s.name}">${isDone ? '✓' : s.stage}</div>`;
    if (idx < STAGE_LABELS.length - 1)
      dotsHtml += `<div class="prog-dot-line ${isDone ? 'done' : ''}"></div>`;
  });
  dotsEl.innerHTML = dotsHtml;
}

// ── Render all stages ─────────────────────────────────────────
function renderAllStages() {
  const container = document.getElementById('stages-container');
  let html = '';

  // ── STAGE 0: MIMO ORIGIN ─────────────────────────────────
  html += `
  <div class="stage-section" id="stage-0">
    <div class="stage-header">
      <div class="stage-badge">
        <span class="stage-icon">💎</span>
        <div>
          <div class="stage-num">ESTÁGIO 0</div>
          <div class="stage-name">Origem</div>
        </div>
      </div>
    </div>
    <div class="mimo-origin-card">
      <div class="mimo-origin-emoji">🐱</div>
      <div class="mimo-origin-text">
        <h3>Mimo</h3>
        <p>O pequeno gato branco cheio de curiosidade e pronto para aprender! Todos começam aqui. Estude, complete atividades, ganhe XP e faça escolhas para evoluir o seu Mimo!</p>
      </div>
    </div>
  </div>
  <div class="section-divider">▼</div>`;

  // ── STAGE 1: CLASS ────────────────────────────────────────
  const s1Unlocked = unlockedStages.includes(1);
  const s1Chosen   = currentEvo.class_path;
  html += renderStageSection(1, 'Classe Evolutiva', '🐾', 'Capítulo 2', s1Unlocked, s1Chosen,
    'ESCOLHA SUA CLASSE',
    CLASSES.map(c => ({
      id: c.id, emoji: c.emoji, name: c.name, subname: null,
      tagline: c.tagline, desc: c.description,
      color: c.color, bg: c.bg,
      onclick: `selectChoice('class_path','${c.id}','${c.name}','${c.emoji}')`,
      selected: s1Chosen === c.id,
    }))
  );
  html += `<div class="section-divider">▼</div>`;

  // ── STAGE 2: LINEAGE ──────────────────────────────────────
  const s2Unlocked = unlockedStages.includes(2) && !!s1Chosen;
  const s2Chosen   = currentEvo.lineage;
  const lineageOpts = s1Chosen ? LINEAGES[s1Chosen] : (LINEAGES.mamifero);
  html += renderStageSection(2, 'Linhagem', '🧬', 'Capítulo 4', s2Unlocked, s2Chosen,
    `ESCOLHA SUA LINHAGEM ${s1Chosen ? '(' + CLASSES.find(c=>c.id===s1Chosen)?.name.toUpperCase() + ')' : ''}`,
    lineageOpts.map(l => ({
      id: l.id, emoji: l.emoji, name: l.name, subname: l.subname,
      tagline: null, desc: l.description,
      color: l.color, bg: `rgba(107,33,168,0.12)`,
      onclick: `selectChoice('lineage','${l.id}','${l.subname}','${l.emoji}')`,
      selected: s2Chosen === l.id,
    }))
  );
  html += `<div class="section-divider">▼</div>`;

  // ── STAGE 3: ALIGNMENT ───────────────────────────────────
  const s3Unlocked = unlockedStages.includes(3) && !!s2Chosen;
  const s3Chosen   = currentEvo.alignment;
  html += renderStageSection(3, 'Alinhamento', '🌙', 'Capítulo 6', s3Unlocked, s3Chosen,
    'ESCOLHA SEU ALINHAMENTO',
    ALIGNMENTS.map(a => ({
      id: a.id, emoji: a.emoji, name: a.name, subname: null,
      tagline: null, desc: a.description,
      color: a.color, bg: a.bg,
      onclick: `selectChoice('alignment','${a.id}','${a.name}','${a.emoji}')`,
      selected: s3Chosen === a.id,
    })),
    'two-col'
  );
  html += `<div class="section-divider">▼</div>`;

  // ── STAGE 4: ELEMENT ──────────────────────────────────────
  const s4Unlocked = unlockedStages.includes(4) && !!s3Chosen;
  const s4Chosen   = currentEvo.element;
  html += renderStageSection(4, 'Elemento', '⚡', 'Capítulo 8', s4Unlocked, s4Chosen,
    'ESCOLHA SEU ELEMENTO',
    ELEMENTS.map(e => ({
      id: e.id, emoji: e.emoji, name: e.name, subname: null,
      tagline: null, desc: e.description,
      color: e.color, bg: e.bg,
      onclick: `selectChoice('element','${e.id}','${e.name}','${e.emoji}')`,
      selected: s4Chosen === e.id,
    }))
  );
  html += `<div class="section-divider">▼</div>`;

  // ── STAGE 5: ARMOR ────────────────────────────────────────
  const s5Unlocked = unlockedStages.includes(5) && !!s4Chosen;
  const s5Chosen   = currentEvo.armor;
  html += renderStageSection(5, 'Armadura', '🛡️', 'Capítulo 11', s5Unlocked, s5Chosen,
    'ESCOLHA SUA ARMADURA',
    ARMORS.map(a => ({
      id: a.id, emoji: a.emoji, name: a.name, subname: null,
      tagline: null, desc: a.description,
      color: a.color, bg: a.bg,
      onclick: `selectChoice('armor','${a.id}','${a.name}','${a.emoji}')`,
      selected: s5Chosen === a.id,
    }))
  );
  html += `<div class="section-divider">▼</div>`;

  // ── STAGE 6: PERSONALITY ──────────────────────────────────
  const s6Unlocked = unlockedStages.includes(6) && !!s5Chosen;
  const s6Chosen   = currentEvo.personality;
  html += renderStageSection(6, 'Personalidade e Objeto', '❤️', 'Capítulo 15', s6Unlocked, s6Chosen,
    'ESCOLHA SUA PERSONALIDADE E RECEBA SEU OBJETO!',
    PERSONALITIES.map(p => ({
      id: p.id, emoji: p.emoji, name: p.name, subname: null,
      tagline: null, desc: p.description,
      color: p.color, bg: p.bg,
      objects: p.objects, objectEmojis: p.objectEmojis,
      onclick: `selectChoice('personality','${p.id}','${p.name}','${p.emoji}')`,
      selected: s6Chosen === p.id,
    }))
  );
  html += `<div class="section-divider">▼</div>`;

  // ── STAGE 7: FINAL EVOLUTION ──────────────────────────────
  const s7Unlocked = unlockedStages.includes(7) && !!s6Chosen;
  const s7Done     = currentEvo.stage >= 7;
  html += `
  <div class="stage-section ${s7Unlocked ? '' : 'locked-section'}" id="stage-7">
    <div class="stage-header">
      <div class="stage-badge">
        <span class="stage-icon">👑</span>
        <div>
          <div class="stage-num">ESTÁGIO 7</div>
          <div class="stage-name">Evolução Final</div>
        </div>
      </div>
      ${s7Unlocked
        ? (s7Done ? '<span class="stage-chosen-pill">✓ Evoluído!</span>' : '')
        : `<span class="stage-locked-pill">🔒 Capítulo 20</span>`}
    </div>
    <div class="stage-title-line">EVOLUÇÃO FINAL — SEU MIMO ATINGE SUA FORMA ADULTA!</div>
    <div class="mimo-summary" id="mimo-final-summary">
      ${s7Unlocked
        ? `<div class="big-mimo">${getMimoDescription(currentEvo).emoji}✨</div>
           <h3>${getMimoDescription(currentEvo).name} — Forma Final</h3>
           <p class="mimo-stage-label">LV${currentEvo.evolution_level} — ${currentEvo.xp_total} XP</p>
           <div class="mimo-traits">${buildTraitChips(currentEvo)}</div>`
        : `<div class="big-mimo" style="opacity:0.3;filter:grayscale(1);">❓</div>
           <h3 style="color:rgba(243,232,255,0.4);">Forma Final Bloqueada</h3>
           <p style="font-size:12px;color:rgba(243,232,255,0.4);">Complete até o Capítulo 20 para desbloquear a evolução final do seu Mimo!</p>`}
    </div>
    <p style="text-align:center;font-size:13px;color:var(--text-light);line-height:1.7;max-width:520px;margin:0 auto;">
      ${s7Unlocked
        ? 'Seu Mimo alcança sua forma adulta, com todo o poder das suas escolhas e conquistas! A jornada está só começando...'
        : 'Estude, evolua e escreva sua própria história na Academia das Questões!'}
    </p>
  </div>`;

  // ── Footer message ────────────────────────────────────────
  html += `
  <div style="text-align:center;margin-top:32px;padding:20px;background:linear-gradient(135deg,rgba(45,16,96,0.7),rgba(15,5,32,0.9));border:1px solid rgba(245,158,11,0.25);border-radius:14px;">
    <div style="font-family:'Cinzel',serif;font-size:13px;color:var(--gold);margin-bottom:8px;">✦ TODAS AS ESCOLHAS SÃO ÚNICAS E ESPECIAIS! ✦</div>
    <p style="font-size:12px;color:var(--text-light);line-height:1.7;">
      Não existe caminho certo ou errado. Escolha o que mais combina com você!<br>
      <strong style="color:var(--text-gold);">Progresso é tudo!</strong> Complete capítulos, ganhe XP e veja seu Mimo evoluir!
    </p>
  </div>`;

  container.innerHTML = html;
}

// ── Build a stage section ─────────────────────────────────────
function renderStageSection(stageNum, stageName, stageIcon, lockChap, unlocked, chosenId, sectionTitle, cards, gridClass = '') {
  const isLocked = !unlocked;
  const hasChoice = !!chosenId;

  let html = `
  <div class="stage-section ${isLocked ? 'locked-section' : ''}" id="stage-${stageNum}">
    <div class="stage-header">
      <div class="stage-badge">
        <span class="stage-icon">${stageIcon}</span>
        <div>
          <div class="stage-num">ESTÁGIO ${stageNum}</div>
          <div class="stage-name">${stageName}</div>
        </div>
      </div>
      ${isLocked
        ? `<span class="stage-locked-pill">🔒 ${lockChap}</span>`
        : hasChoice
          ? `<span class="stage-chosen-pill">✓ ${cards.find(c=>c.id===chosenId)?.name || 'Escolhido'}</span>`
          : ''}
    </div>
    <div class="stage-title-line">${sectionTitle}</div>
    <div class="choice-grid ${gridClass}">`;

  cards.forEach(card => {
    const sel = card.selected;
    const borderColor = card.color || '#9333ea';
    html += `
    <div class="choice-card ${sel ? 'selected' : ''}"
      style="border-color:${sel ? borderColor : 'rgba(107,33,168,0.35)'};background:${sel ? card.bg : ''}"
      onclick="${isLocked ? '' : card.onclick}">
      <div class="card-emoji-wrap" style="color:${card.color};border-color:${sel?card.color:'rgba(245,158,11,0.3)'};">${card.emoji}</div>
      <div class="card-choice-name" style="color:${card.color}">${card.name}</div>
      ${card.subname ? `<div class="card-choice-subname">${card.subname}</div>` : ''}
      ${card.tagline ? `<div class="card-choice-tagline" style="color:${card.color}">${card.tagline}</div>` : ''}
      <div class="card-choice-desc">${card.desc}</div>
      ${card.objects ? `<div class="card-objects">${card.objects.map((o,i) => `<span class="obj-chip">${card.objectEmojis[i]} ${o}</span>`).join('')}</div>` : ''}
    </div>`;
  });

  html += `</div></div>`;
  return html;
}

// ── Build trait chips from evolution ─────────────────────────
function buildTraitChips(evo) {
  const chips = [];
  if (evo.class_path) {
    const c = CLASSES.find(x => x.id === evo.class_path);
    if (c) chips.push(`<div class="mimo-trait-chip">${c.emoji} ${c.name}</div>`);
  }
  if (evo.lineage && evo.class_path) {
    const lin = (LINEAGES[evo.class_path] || []).find(x => x.id === evo.lineage);
    if (lin) chips.push(`<div class="mimo-trait-chip">${lin.emoji} ${lin.subname}</div>`);
  }
  if (evo.alignment) {
    const a = ALIGNMENTS.find(x => x.id === evo.alignment);
    if (a) chips.push(`<div class="mimo-trait-chip">${a.emoji} ${a.name}</div>`);
  }
  if (evo.element) {
    const e = ELEMENTS.find(x => x.id === evo.element);
    if (e) chips.push(`<div class="mimo-trait-chip">${e.emoji} ${e.name}</div>`);
  }
  if (evo.armor) {
    const ar = ARMORS.find(x => x.id === evo.armor);
    if (ar) chips.push(`<div class="mimo-trait-chip">${ar.emoji} ${ar.name}</div>`);
  }
  if (evo.personality) {
    const p = PERSONALITIES.find(x => x.id === evo.personality);
    if (p) chips.push(`<div class="mimo-trait-chip">${p.emoji} ${p.name}</div>`);
  }
  return chips.join('') || '<div class="mimo-trait-chip">🐱 Origem</div>';
}

// ── Select a choice ───────────────────────────────────────────
async function selectChoice(field, value, name, emoji) {
  const student = Auth.student;
  if (!student) return;

  // If already chosen and same value, allow changing
  const prev = currentEvo[field];

  // Save
  const result = await EvoDB.saveChoice(student.id, field, value);
  currentEvo = result.evo;

  // Re-render
  renderHeader();
  renderAllStages();

  // Scroll to next stage smoothly
  const fieldToStage = {
    class_path: 2, lineage: 3, alignment: 4, element: 5, armor: 6, personality: 7
  };
  const nextStage = fieldToStage[field];
  if (nextStage) {
    setTimeout(() => {
      const nextEl = document.getElementById('stage-' + nextStage);
      if (nextEl) nextEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 300);
  }

  // Toast
  showToast(emoji, `${name} escolhido${prev ? ' (alterado)' : ''}! ✨`);
}

// ── Toast ─────────────────────────────────────────────────────
function showToast(icon, msg) {
  const toast   = document.getElementById('evo-toast');
  const iconEl  = document.getElementById('toast-icon');
  const msgEl   = document.getElementById('toast-msg');
  iconEl.textContent = icon;
  msgEl.textContent  = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2800);
}

// ── Back navigation ───────────────────────────────────────────
function goBack() { window.location.href = '/'; }

// ── Init ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', initEvoPage);
</script>
</body>
</html>
